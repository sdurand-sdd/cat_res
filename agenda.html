<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Mon Agenda</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📅</text></svg>">
<style>
:root {
  --bg: #faf8f5;
  --paper: #ffffff;
  --border: #e8e2d9;
  --border2: #d4cdc3;
  --text: #2c2825;
  --text2: #7a7068;
  --text3: #b0a89e;
  --pink: #f9e4ec;
  --pink-b: #e8a0bc;
  --blue: #e0eef9;
  --blue-b: #89b8dc;
  --green: #e2f2e8;
  --green-b: #8dc9a0;
  --yellow: #fef6e0;
  --yellow-b: #e8c96d;
  --purple: #ede8f8;
  --purple-b: #a98fd4;
  --peach: #fde8dc;
  --peach-b: #e8a07a;
  --teal: #e0f4f2;
  --teal-b: #7dc4bc;
  --lavender: #ece8f8;
  --lavender-b: #b4a8e0;
  --accent: #d4517a;
  --accent-b: #4a90c4;
  --today-bg: #fff8e6;
  /* Couleurs par classe */
  --c-4d4-bg: #fde8f0; --c-4d4-b: #e8a0bc;
  --c-4d5-bg: #fef0e0; --c-4d5-b: #e8a878;
  --c-4d2-bg: #fefbe0; --c-4d2-b: #d4c050;
  --c-3d1-bg: #e8f6ee; --c-3d1-b: #7dc4a0;
  --c-3d3-bg: #e0f0fb; --c-3d3-b: #80bce8;
  --c-3d5-bg: #f0eafb; --c-3d5-b: #b090d8;
  --c-5d3-bg: #fde8e4; --c-5d3-b: #e89080;
  --c-5d3g-bg: #fde8e4; --c-5d3g-b: #e89080;
  --today-border: #e8c96d;
  --shadow: 0 2px 12px rgba(0,0,0,0.07);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
  --radius: 12px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 14px;
}

/* ── HEADER ── */
.app-header {
  background: var(--paper);
  border-bottom: 2px solid var(--border);
  padding: 12px 20px;
  display: flex;
  align-items: center;
  gap: 14px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: var(--shadow);
}

.app-header h1 {
  font-family: 'Caveat', cursive;
  font-size: 1.6rem;
  color: var(--accent);
  letter-spacing: -0.5px;
  line-height: 1;
}

.week-nav {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-left: auto;
}

.week-label {
  text-align: center;
  min-width: 200px;
}

.week-label .week-dates {
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--text);
}

.week-label .week-type {
  font-family: 'Caveat', cursive;
  font-size: 1.1rem;
  font-weight: 700;
  line-height: 1;
}
.week-type.A { color: var(--accent); }
.week-type.B { color: var(--accent-b); }

.nav-btn {
  background: var(--bg);
  border: 1.5px solid var(--border2);
  border-radius: 8px;
  padding: 6px 12px;
  font-family: inherit;
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
  color: var(--text2);
  transition: all 0.15s;
}
.nav-btn:hover { background: var(--border); color: var(--text); }
.nav-btn.today-btn { color: var(--accent); border-color: var(--accent); background: #fdf0f5; }
.nav-btn.today-btn:hover { background: var(--accent); color: white; }

.sync-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text3); transition: background 0.3s; flex-shrink: 0; }
.sync-dot.ok { background: #6dbf8e; }
.sync-dot.err { background: #e07070; }
.sync-dot.loading { background: var(--yellow-b); animation: pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

.logout-btn {
  background: none;
  border: 1.5px solid var(--border2);
  border-radius: 8px;
  padding: 5px 10px;
  font-family: inherit;
  font-size: 0.78rem;
  font-weight: 600;
  color: var(--text3);
  cursor: pointer;
  transition: all 0.15s;
}
.logout-btn:hover { color: var(--accent); border-color: var(--accent); }

/* ── NOTES BAR ── */
.notes-bar {
  background: var(--yellow);
  border-bottom: 1px solid var(--yellow-b);
  padding: 6px 20px;
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 0.82rem;
}
.notes-bar label { font-weight: 700; color: var(--text2); white-space: nowrap; font-family: 'Caveat', cursive; font-size: 1rem; }
.notes-bar input {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  font-family: inherit;
  font-size: 0.85rem;
  color: var(--text);
  font-style: italic;
}
.notes-bar input::placeholder { color: var(--text3); }

/* ── GRID ── */
.grid-wrapper {
  overflow-x: auto;
  padding: 16px;
  min-height: calc(100vh - 110px);
}

.week-grid {
  display: grid;
  grid-template-columns: 80px repeat(5, 1fr);
  gap: 0;
  min-width: 700px;
  border: 1.5px solid var(--border2);
  border-radius: var(--radius);
  overflow: hidden;
  background: var(--border);
  box-shadow: var(--shadow-lg);
}

/* Header row */
.grid-header {
  background: var(--paper);
  padding: 8px 6px;
  text-align: center;
  font-weight: 700;
  font-size: 0.82rem;
  border-right: 1px solid var(--border);
  border-bottom: 2px solid var(--border2);
  color: var(--text2);
  position: sticky;
  top: 0;
}
.grid-header.day-header { color: var(--text); }
.grid-header.day-header .day-name { font-size: 0.9rem; font-weight: 700; }
.grid-header.day-header .day-num {
  font-family: 'Caveat', cursive;
  font-size: 1.3rem;
  font-weight: 700;
  line-height: 1;
  color: var(--text2);
}
.grid-header.day-header.is-today .day-num { color: var(--accent); }
.grid-header.day-header.is-today { background: var(--today-bg); border-bottom-color: var(--today-border); }
.grid-header:last-child { border-right: none; }

/* Slot label column */
.slot-label {
  background: var(--bg);
  padding: 6px 8px;
  border-right: 2px solid var(--border2);
  border-bottom: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
  gap: 2px;
  min-height: 90px;
}
.slot-label .slot-class {
  font-family: 'Caveat', cursive;
  font-size: 1rem;
  font-weight: 700;
  color: var(--text2);
  line-height: 1.2;
}
.slot-label .slot-time {
  font-size: 0.68rem;
  color: var(--text3);
}

/* Cell */
.cell {
  background: var(--paper);
  border-right: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  padding: 4px;
  min-height: 90px;
  cursor: pointer;
  transition: background 0.12s;
  position: relative;
  vertical-align: top;
}
.cell:last-child { border-right: none; }
.cell:hover { background: #faf5ff; }
.cell.is-today { background: var(--today-bg); }
.cell.is-today:hover { background: #fff3d4; }

/* Tags inside cell */
.cell-tags { display: flex; flex-direction: column; gap: 3px; height: 100%; }

.tag {
  border-radius: 6px;
  padding: 3px 6px;
  font-size: 0.74rem;
  font-weight: 600;
  line-height: 1.3;
  position: relative;
  cursor: pointer;
  transition: filter 0.1s;
}
.tag:hover { filter: brightness(0.93); }
.tag .tag-del {
  position: absolute;
  top: 1px; right: 3px;
  font-size: 0.65rem;
  color: rgba(0,0,0,0.3);
  cursor: pointer;
  display: none;
  line-height: 1;
}
.tag:hover .tag-del { display: block; }
.tag .tag-del:hover { color: rgba(0,0,0,0.7); }

.tag.cours    { background: var(--blue);   border-left: 3px solid var(--blue-b); color: #2a5580; }
.tag.eval     { background: var(--pink);   border-left: 3px solid var(--pink-b); color: #7a2048; }
.tag.reunion  { background: var(--purple); border-left: 3px solid var(--purple-b); color: #4a2d80; }
.tag.tache    { background: var(--green);  border-left: 3px solid var(--green-b); color: #2a6040; }
.tag.note     { background: var(--yellow); border-left: 3px solid var(--yellow-b); color: #6b5000; }

.cell-add {
  opacity: 0;
  font-size: 0.72rem;
  color: var(--text3);
  text-align: center;
  padding: 4px;
  transition: opacity 0.15s;
  margin-top: auto;
}
.cell:hover .cell-add { opacity: 1; }

/* ── MODAL ── */
.overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.35);
  z-index: 200;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(2px);
  padding: 20px;
}
.overlay.open { display: flex; }

.modal {
  background: var(--paper);
  border-radius: 18px;
  padding: 24px;
  max-width: 420px;
  width: 100%;
  box-shadow: var(--shadow-lg);
  animation: popIn 0.18s ease;
}
@keyframes popIn { from{transform:scale(0.94);opacity:0} to{transform:scale(1);opacity:1} }

.modal-title {
  font-family: 'Caveat', cursive;
  font-size: 1.3rem;
  color: var(--accent);
  margin-bottom: 16px;
}

.type-selector {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 14px;
}
.type-btn {
  border: 1.5px solid var(--border2);
  border-radius: 20px;
  padding: 5px 12px;
  font-family: inherit;
  font-size: 0.8rem;
  font-weight: 600;
  cursor: pointer;
  background: white;
  color: var(--text2);
  transition: all 0.15s;
}
.type-btn:hover { border-color: var(--text2); color: var(--text); }
.type-btn.active.cours   { background: var(--blue);   border-color: var(--blue-b);   color: #2a5580; }
.type-btn.active.eval    { background: var(--pink);   border-color: var(--pink-b);   color: #7a2048; }
.type-btn.active.reunion { background: var(--purple); border-color: var(--purple-b); color: #4a2d80; }
.type-btn.active.tache   { background: var(--green);  border-color: var(--green-b);  color: #2a6040; }
.type-btn.active.note    { background: var(--yellow); border-color: var(--yellow-b); color: #6b5000; }

.modal input, .modal textarea, .modal select {
  width: 100%;
  border: 1.5px solid var(--border2);
  border-radius: 8px;
  padding: 9px 12px;
  font-family: inherit;
  font-size: 0.9rem;
  color: var(--text);
  background: var(--bg);
  outline: none;
  transition: border-color 0.2s;
  margin-bottom: 10px;
}
.modal input:focus, .modal textarea:focus, .modal select:focus { border-color: var(--accent); }
.modal textarea { min-height: 70px; resize: vertical; }
.modal select option { background: white; }

.modal-foot {
  display: flex;
  gap: 8px;
  justify-content: flex-end;
  margin-top: 6px;
}
.mbtn {
  border: none;
  border-radius: 8px;
  padding: 9px 20px;
  font-family: inherit;
  font-size: 0.88rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
}
.mbtn:hover { filter: brightness(1.07); transform: translateY(-1px); }
.mbtn-accent { background: var(--accent); color: white; }
.mbtn-cancel { background: var(--bg); color: var(--text2); border: 1.5px solid var(--border2); }

/* ── LOGIN SCREEN ── */
.fullscreen {
  display: none;
  position: fixed;
  inset: 0;
  background: var(--bg);
  z-index: 400;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.fullscreen.show { display: flex; }

.screen-box {
  background: var(--paper);
  border-radius: 20px;
  padding: 36px 32px;
  max-width: 380px;
  width: 100%;
  box-shadow: var(--shadow-lg);
  border: 1.5px solid var(--border);
}
.screen-box h2 {
  font-family: 'Caveat', cursive;
  font-size: 2rem;
  color: var(--accent);
  margin-bottom: 4px;
}
.screen-box p { font-size: 0.85rem; color: var(--text2); margin-bottom: 24px; }
.sfield { margin-bottom: 14px; }
.sfield label { display: block; font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text3); margin-bottom: 5px; }
.sfield input { width: 100%; background: var(--bg); border: 1.5px solid var(--border2); border-radius: 10px; padding: 11px 14px; font-family: inherit; font-size: 0.9rem; color: var(--text); outline: none; transition: border-color 0.2s; }
.sfield input:focus { border-color: var(--accent); }
.screen-error { color: #e05c5c; font-size: 0.82rem; margin-bottom: 10px; min-height: 18px; font-weight: 600; }
.screen-btn { width: 100%; background: var(--accent); color: white; border: none; border-radius: 10px; padding: 13px; font-family: inherit; font-size: 0.95rem; font-weight: 700; cursor: pointer; transition: all 0.15s; }
.screen-btn:hover { filter: brightness(1.08); }
.screen-btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* ── GREYED CELLS ── */
.cell.no-cours {
  background: white !important;
  cursor: default;
}
.cell.no-cours:hover { background: #fafafa !important; }
.cell.no-cours .cell-add { display: none; }
.slot-label.no-cours-row { opacity: 0.5; }

/* Daily notes row */
.day-notes-row {
  background: var(--yellow);
  border-bottom: 2px solid var(--yellow-b);
}
.day-notes-cell {
  border-right: 1px solid var(--border);
  padding: 4px 6px;
}
.day-notes-cell:last-child { border-right: none; }
.day-notes-label {
  background: var(--bg);
  border-right: 2px solid var(--border2);
  padding: 4px 8px;
  display: flex;
  align-items: center;
  font-size: 0.7rem;
  font-weight: 700;
  color: var(--text3);
  font-style: italic;
}
.day-notes-input {
  width: 100%;
  border: none;
  outline: none;
  background: transparent;
  font-family: inherit;
  font-size: 0.78rem;
  color: var(--text);
  resize: none;
  min-height: 28px;
  line-height: 1.4;
  padding: 2px 0;
}
.day-notes-input::placeholder { color: var(--text3); font-style: italic; }

/* Config mode */
.config-mode .cell {
  cursor: pointer !important;
  position: relative;
}
.config-mode .cell::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 0;
  transition: background 0.1s;
}
.config-mode .cell:hover::after {
  background: rgba(212,81,122,0.12);
}
/* Morning / afternoon separator — full row spanning all columns */
.separator-row {
  display: none; /* not used anymore */
}
/* Thick border BELOW the last morning slot row */
.cell.last-morning {
  border-bottom: 4px solid var(--border2) !important;
}
.slot-label.last-morning {
  border-bottom: 4px solid var(--border2) !important;
}

.config-mode .cell.no-cours::after {
  background: rgba(0,0,0,0.04);
}
.config-mode .cell.no-cours:hover::after {
  background: rgba(61,153,112,0.12);
}
.config-mode-bar {
  display: none;
  background: #fff3f7;
  border-bottom: 2px solid var(--pink-b);
  padding: 8px 20px;
  align-items: center;
  gap: 12px;
  font-size: 0.84rem;
  font-weight: 600;
  color: var(--accent);
}
.config-mode-bar.show { display: flex; }
.config-mode-bar span { flex: 1; }
.config-done-btn {
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 8px;
  padding: 6px 16px;
  font-family: inherit;
  font-size: 0.84rem;
  font-weight: 700;
  cursor: pointer;
}

/* ── TOAST ── */
/* Settings */
.settings-table { width: 100%; border-collapse: collapse; min-width: 500px; }
.settings-table th { font-size: 0.76rem; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; padding: 6px 8px; text-align: center; border-bottom: 2px solid var(--border2); }
.settings-table th:first-child { text-align: left; }
.settings-table td { padding: 4px 4px; border-bottom: 1px solid var(--border); }
.settings-table select { width: 100%; border: 1.5px solid var(--border2); border-radius: 6px; padding: 5px 4px; font-family: inherit; font-size: 0.82rem; color: var(--text); background: var(--bg); outline: none; cursor: pointer; }
.settings-table select:focus { border-color: var(--accent); }
.class-row { display: flex; align-items: center; gap: 10px; padding: 6px 0; border-bottom: 1px solid var(--border); }
.class-row:last-child { border-bottom: none; }
.class-swatch { width: 22px; height: 22px; border-radius: 50%; flex-shrink: 0; border: 2px solid rgba(0,0,0,0.1); }
.class-name-badge { font-weight: 700; font-size: 0.88rem; flex: 1; }
.slot-row { display: flex; align-items: center; gap: 8px; padding: 5px 0; border-bottom: 1px solid var(--border); }
.slot-row input { border: 1.5px solid var(--border2); border-radius: 6px; padding: 5px 8px; font-family: inherit; font-size: 0.85rem; outline: none; width: 70px; }
.slot-row input:focus { border-color: var(--accent); }
.del-btn { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 1rem; padding: 2px 6px; border-radius: 5px; transition: all 0.12s; }
.del-btn:hover { background: #fde8e8; color: var(--accent); }

.toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(60px); background: var(--text); color: white; border-radius: 10px; padding: 9px 18px; font-size: 0.84rem; font-weight: 600; z-index: 999; opacity: 0; transition: all 0.25s; pointer-events: none; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

@media (max-width: 750px) {
  .app-header { flex-wrap: wrap; gap: 8px; padding: 10px 14px; }
  .app-header h1 { font-size: 1.3rem; }
  .week-nav { margin-left: 0; width: 100%; justify-content: space-between; }
  .week-label { min-width: 0; flex: 1; }
  .grid-wrapper { padding: 8px; }
  .slot-label { min-height: 70px; }
  .cell { min-height: 70px; }
}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="fullscreen" id="loginScreen">
  <div class="screen-box">
    <h2>📅 Mon Agenda</h2>
    <p>Connectez-vous pour accéder à votre planning</p>
    <div class="sfield">
      <label>Email</label>
      <input type="email" id="loginEmail" placeholder="votre@email.com" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <div class="sfield">
      <label>Mot de passe</label>
      <input type="password" id="loginPwd" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <div class="screen-error" id="loginError"></div>
    <button class="screen-btn" id="loginBtn" onclick="doLogin()">Se connecter</button>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none">
  <div class="app-header">
    <h1>📅 Mon Agenda</h1>
    <div class="week-nav">
      <button class="nav-btn" onclick="changeWeek(-1)">◀</button>
      <div class="week-label">
        <div class="week-dates" id="weekDates"></div>
        <div class="week-type" id="weekType"></div>
      </div>
      <button class="nav-btn" onclick="changeWeek(1)">▶</button>
      <button class="nav-btn today-btn" onclick="goToday()">Auj.</button>
    </div>
    <div class="sync-dot" id="syncDot"></div>
    <button class="logout-btn" onclick="doLogout()">⎋ Déco</button>
    <button class="logout-btn" onclick="openSettings()" id="settingsBtn" title="Paramètres EDT">⚙️ EDT</button>
    <button class="logout-btn" onclick="toggleConfigMode()" id="configModeBtn" title="Exceptions ponctuelles">✏️</button>
  </div>

  <div class="notes-bar">
    <label>Notes :</label>
    <input type="text" id="weekNotes" placeholder="Réunion, CA, infos importantes pour cette semaine…" oninput="saveNotes()">
  </div>

  <div class="config-mode-bar" id="configModeBar">
    <span>✏️ Mode configuration — cliquez sur une case pour la griser (pas de cours) ou la réactiver</span>
    <button class="config-done-btn" onclick="toggleConfigMode()">✓ Terminé</button>
  </div>

  <div class="grid-wrapper">
    <div class="week-grid" id="weekGrid"></div>
  </div>
</div>

<!-- ADD EVENT MODAL -->
<div class="overlay" id="addModal">
  <div class="modal">
    <div class="modal-title" id="modalTitle">Ajouter un événement</div>
    <div class="type-selector">
      <button class="type-btn active cours"   data-type="cours"   onclick="selectType('cours')">📘 Cours</button>
      <button class="type-btn eval"            data-type="eval"    onclick="selectType('eval')">📝 Éval</button>
      <button class="type-btn reunion"         data-type="reunion" onclick="selectType('reunion')">👥 Réunion</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

// ── CONFIG ────────────────────────────────────────────────────────────────────
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyCy9ooNIoqpfH8uxzo3_YboWvTqkxAmDgI",
  authDomain: "todolist-9bab9.firebaseapp.com",
  projectId: "todolist-9bab9",
  storageBucket: "todolist-9bab9.firebasestorage.app",
  messagingSenderId: "209518858392",
  appId: "1:209518858392:web:5043be46f619d0251c40ed"
};

// ── EMPLOI DU TEMPS ──────────────────────────────────────────────────────────
const DAYS = ['Lundi','Mardi','Mercredi','Jeudi','Vendredi'];
const DAYS_SHORT = ['Lun','Mar','Mer','Jeu','Ven'];
// Dynamic EDT — loaded from Firebase, defaults below
let SLOTS = ['M1','M2','M3','M4','S1','S2','S3','S4'];

let EDT = {
  A: {
    M1: ['4°4',  '4°5',  '4°5',  null,   null  ],
    M2: ['3°1',  '3°1',  null,   null,   null  ],
    M3: ['4°2',  '4°2',  '4°4',  null,   '5°3' ],
    M4: [null,   '3°5',  '3°5',  '4°2',  '3°3' ],
    S1: [null,   null,   null,   null,   null  ],
    S2: [null,   '5°3',  null,   '3°5',  null  ],
    S3: ['5°3G', null,   null,   '3°1',  null  ],
    S4: ['5°3G', null,   null,   '3°3',  null  ],
  },
  B: {
    M1: ['4°4',  '4°5',  '4°5',  '4°4',  null  ],
    M2: ['3°1',  null,   null,   null,   null  ],
    M3: ['4°2',  '4°2',  '4°4',  null,   '5°3' ],
    M4: [null,   '3°5',  null,   '4°5',  '3°3' ],
    S1: [null,   null,   null,   null,   null  ],
    S2: [null,   '3°3',  null,   '3°5',  null  ],
    S3: ['5°3',  null,   null,   '3°1',  null  ],
    S4: ['3°3',  null,   null,   null,   null  ],
  }
};

// Classes with colors — loaded from Firebase
let CLASS_LIST = [
  { name: '4°4',  color: '#fde8f0' },
  { name: '4°5',  color: '#fef0e0' },
  { name: '4°2',  color: '#fefbe0' },
  { name: '3°1',  color: '#e8f6ee' },
  { name: '3°3',  color: '#e0f0fb' },
  { name: '3°5',  color: '#f0eafb' },
  { name: '5°3',  color: '#fde8e4' },
  { name: '5°3G', color: '#fde8e4' },
];

function getClassColor(name) {
  const c = CLASS_LIST.find(cl => cl.name === name);
  if (!c) return null;
  const hex = c.color;
  // derive border (darker) and text (much darker)
  return { bg: hex, border: darken(hex, 0.25), text: darken(hex, 0.55) };
}

function darken(hex, amount) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  const d = v => Math.max(0, Math.round(v * (1 - amount)));
  return `rgb(${d(r)},${d(g)},${d(b)})`;
}

// ── STATE ─────────────────────────────────────────────────────────────────────
let db = null, auth = null;
let weekData = {};   // { 'YYYY-Www': { notes: '', cells: { 'slot-day': [{id,type,text}] } } }
let currentWeekKey = '';
let currentMonday = getMonday(new Date());
let modalContext = null; // { slotIdx, dayIdx }
let selectedType = 'cours';
let saveTimer = null;
let configMode = false;
// EDT config stored per week type: { A: { '0-1': true, ... }, B: { ... } }

// ── FIREBASE ──────────────────────────────────────────────────────────────────
async function bootApp() {
  try {
    const app = initializeApp(FIREBASE_CONFIG);
    db = getFirestore(app);
    auth = getAuth(app);
    onAuthStateChanged(auth, user => {
      if (user) {
        document.getElementById('loginScreen').classList.remove('show');
        document.getElementById('app').style.display = '';
        startListener();
      } else {
        document.getElementById('loginScreen').classList.add('show');
        document.getElementById('app').style.display = 'none';
        setSyncState('err');
      }
    });
  } catch(e) {
    console.error(e);
    document.getElementById('loginError').textContent = '⚠️ Erreur Firebase : ' + e.message;
    document.getElementById('loginScreen').classList.add('show');
  }
}

function startListener() {
  onSnapshot(doc(db, 'agenda', 'data'), snap => {
    const d = snap.exists() ? snap.data() : {};
    weekData = d.weeks || {};
    edtConfig = d.edt || { A: {}, B: {} };
    if (!edtConfig.A) edtConfig.A = {};
    if (!edtConfig.B) edtConfig.B = {};
    if (d.slots) SLOTS = d.slots;
    if (d.edt_grid) {
      EDT = { A: {}, B: {} };
      ['A','B'].forEach(w => {
        if (!d.edt_grid[w]) return;
        SLOTS.forEach(s => {
          const raw = d.edt_grid[w][s];

          if (Array.isArray(raw)) {
            const arr = raw.map(v => (v === '' || v === undefined || v === null) ? null : v);
            while (arr.length < 5) arr.push(null);
            EDT[w][s] = arr;
          } else {
            EDT[w][s] = [null,null,null,null,null];
          }
        });
      });

    }
    if (d.classes) CLASS_LIST = d.classes;
    renderWeek();
    setSyncState('ok');
  }, () => setSyncState('err'));
}

let edtConfig = { A: {}, B: {} };

async function save() {
  if (!db) return;
  setSyncState('loading');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    try {
      // Firestore doesn't preserve null in arrays — convert null <-> "" 
      function edtToFirestore(edt) {
        const out = {};
        ['A','B'].forEach(w => {
          out[w] = {};
          Object.keys(edt[w]).forEach(slot => {
            out[w][slot] = edt[w][slot].map(v => v === null ? '' : v);
          });
        });
        return out;
      }
      await setDoc(doc(db, 'agenda', 'data'), { weeks: weekData, edt: edtConfig, slots: SLOTS, edt_grid: edtToFirestore(EDT), classes: CLASS_LIST });
      setSyncState('ok');
    } catch(e) { setSyncState('err'); }
  }, 600);
}

// ── WEEK LOGIC ────────────────────────────────────────────────────────────────
function getMonday(date) {
  const d = new Date(date);
  const day = d.getDay();
  const diff = (day === 0) ? -6 : 1 - day;
  d.setDate(d.getDate() + diff);
  d.setHours(0,0,0,0);
  return d;
}

function weekKey(monday) {
  const y = monday.getFullYear();
  // ISO week number
  const jan4 = new Date(y, 0, 4);
  const w = Math.ceil(((monday - jan4) / 86400000 + jan4.getDay() + 1) / 7);
  return `${y}-W${String(w).padStart(2,'0')}`;
}

function isWeekA(monday) {
  // Semaine A = numéro de semaine impair
  const y = monday.getFullYear();
  const jan4 = new Date(y, 0, 4);
  const w = Math.ceil(((monday - jan4) / 86400000 + jan4.getDay() + 1) / 7);
  return w % 2 === 1;
}

function formatDateRange(monday) {
  const friday = new Date(monday);
  friday.setDate(monday.getDate() + 4);
  const opts = { day: 'numeric', month: 'long' };
  const optsY = { day: 'numeric', month: 'long', year: 'numeric' };
  if (monday.getFullYear() === friday.getFullYear()) {
    return `${monday.toLocaleDateString('fr-FR', opts)} – ${friday.toLocaleDateString('fr-FR', optsY)}`;
  }
  return `${monday.toLocaleDateString('fr-FR', optsY)} – ${friday.toLocaleDateString('fr-FR', optsY)}`;
}

function isToday(monday, dayIdx) {
  const d = new Date(monday);
  d.setDate(monday.getDate() + dayIdx);
  const t = new Date();
  return d.toDateString() === t.toDateString();
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function renderWeek() {
  currentWeekKey = weekKey(currentMonday);
  const wA = isWeekA(currentMonday);
  const data = weekData[currentWeekKey] || { notes: '', cells: {} };

  // Header info
  document.getElementById('weekDates').textContent = formatDateRange(currentMonday);
  const wtEl = document.getElementById('weekType');
  wtEl.textContent = `Semaine ${wA ? 'A' : 'B'}`;
  wtEl.className = `week-type ${wA ? 'A' : 'B'}`;

  // Notes
  document.getElementById('weekNotes').value = data.notes || '';

  // Build grid
  const grid = document.getElementById('weekGrid');
  let html = '';

  // Header row
  html += `<div class="grid-header">Cours</div>`;
  for (let d = 0; d < 5; d++) {
    const date = new Date(currentMonday);
    date.setDate(currentMonday.getDate() + d);
    const todayCls = isToday(currentMonday, d) ? ' is-today' : '';
    html += `<div class="grid-header day-header${todayCls}">
      <div class="day-name">${DAYS_SHORT[d]}</div>
      <div class="day-num">${date.getDate()}</div>
    </div>`;
  }

  // Slot rows — based on real EDT
  const weekType = wA ? 'A' : 'B';
  // Find last morning slot (M prefix) — used for separator
  const morningSlots = SLOTS.filter(s => s.startsWith('M'));
  const lastMorningSlot = morningSlots.length > 0 ? morningSlots[morningSlots.length - 1] : null;

  SLOTS.forEach((slot, si) => {
    const rowClasses = (EDT[weekType] && EDT[weekType][slot]) || [null,null,null,null,null];
    // Show row if it has at least one class assigned, OR if it has events saved
    const rowHasClass = rowClasses.some(c => c !== null);
    const rowHasEvents = [0,1,2,3,4].some(d => {
      const ck = `${si}-${d}`;
      return (data.cells && data.cells[ck] && data.cells[ck].length > 0);
    });
    if (!rowHasClass && !rowHasEvents) return;

    const isLastMorning = (slot === lastMorningSlot);
    const labelSepCls = isLastMorning ? ' last-morning' : '';
    html += `<div class="slot-label${labelSepCls}"><span class="slot-class">${slot}</span></div>`;

    for (let d = 0; d < 5; d++) {
      const cellKey = `${si}-${d}`;
      const events = (data.cells && data.cells[cellKey]) || [];
      const baseClass = EDT[weekType][slot][d];

      const override = edtConfig[weekType] ? edtConfig[weekType][cellKey] : undefined;
      // A cell is "no cours" only if explicitly greyed via config mode (override===true)
      // A null baseClass is still clickable/usable
      const isNoCours = override === true;
      const noCoursCls = isNoCours ? ' no-cours' : '';
      const todayClsD = isToday(currentMonday, d) ? ' is-today' : '';
      const clickHandler = `onCellClick(event,${si},${d})`;
      const cc = baseClass && getClassColor(baseClass);
      const cellStyle = cc ? `style="background:${cc.bg};border-top:3px solid ${cc.border}"` : '';
      const classLabel = baseClass
        ? `<span style="font-size:0.78rem;font-weight:800;color:${cc ? cc.text : 'var(--accent-b)'};display:block;margin-bottom:3px">${baseClass}</span>`
        : '';

      const cellSepCls = isLastMorning ? ' last-morning' : '';
      html += `<div class="cell${todayClsD}${noCoursCls}${cellSepCls}" ${!isNoCours && cc ? cellStyle : ''} onclick="${clickHandler}">
        <div class="cell-tags">`;

      if (!isNoCours) {
        html += classLabel;
        events.forEach(ev => {
          html += `<div class="tag ${ev.type}" onclick="event.stopPropagation()">
            ${esc(ev.text)}
            <span class="tag-del" onclick="event.stopPropagation();deleteEvent('${cellKey}','${ev.id}')">✕</span>
          </div>`;
        });
      }

      html += `</div>
        <div class="cell-add">+ ajouter</div>
      </div>`;
    }
  });

  // Daily notes row
  const dayNotes = (data.dayNotes) || {};
  html += `<div class="day-notes-label">📝 Notes du jour</div>`;
  for (let d = 0; d < 5; d++) {
    const dateKey = getDayKey(currentMonday, d);
    const noteVal = dayNotes[dateKey] || '';
    html += `<div class="day-notes-cell day-notes-row">
      <textarea class="day-notes-input" rows="2" placeholder="Notes…"
        onchange="saveDayNote('${dateKey}', this.value)"
        onclick="event.stopPropagation()">${esc(noteVal)}</textarea>
    </div>`;
  }

  grid.innerHTML = html;
}

function getDayKey(monday, dayIdx) {
  const d = new Date(monday);
  d.setDate(monday.getDate() + dayIdx);
  return d.toISOString().slice(0,10);
}

// ── ACTIONS ───────────────────────────────────────────────────────────────────
window.changeWeek = function(dir) {
  currentMonday = new Date(currentMonday);
  currentMonday.setDate(currentMonday.getDate() + dir * 7);
  renderWeek();
};

window.goToday = function() {
  currentMonday = getMonday(new Date());
  renderWeek();
};

window.saveNotes = function() {
  const val = document.getElementById('weekNotes').value;
  if (!weekData[currentWeekKey]) weekData[currentWeekKey] = { notes: '', cells: {} };
  weekData[currentWeekKey].notes = val;
  save();
};

window.openAddModal = function(slotIdx, dayIdx) {
  modalContext = { slotIdx, dayIdx };
  const date = new Date(currentMonday);
  date.setDate(currentMonday.getDate() + dayIdx);
  const wt = isWeekA(currentMonday) ? 'A' : 'B';
  const className = EDT[wt][SLOTS[slotIdx]][dayIdx] || SLOTS[slotIdx];
  document.getElementById('modalTitle').textContent =
    `${className} — ${DAYS[dayIdx]} ${date.getDate()}/${date.getMonth()+1}`;
  document.getElementById('eventText').value = '';
  selectType('cours');
  document.getElementById('addModal').classList.add('open');
  setTimeout(() => document.getElementById('eventText').focus(), 100);
};

window.closeModal = function() {
  document.getElementById('addModal').classList.remove('open');
  modalContext = null;
};

window.selectType = function(type) {
  selectedType = type;
  document.querySelectorAll('.type-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.type === type);
  });
};

window.saveEvent = function() {
  const text = document.getElementById('eventText').value.trim();
  if (!text || !modalContext) return;
  const { slotIdx, dayIdx } = modalContext;
  const cellKey = `${slotIdx}-${dayIdx}`;
  if (!weekData[currentWeekKey]) weekData[currentWeekKey] = { notes: '', cells: {} };
  if (!weekData[currentWeekKey].cells) weekData[currentWeekKey].cells = {};
  if (!weekData[currentWeekKey].cells[cellKey]) weekData[currentWeekKey].cells[cellKey] = [];
  weekData[currentWeekKey].cells[cellKey].push({ id: uid(), type: selectedType, text });
  closeModal();
  save();
};

window.deleteEvent = function(cellKey, evId) {
  if (!weekData[currentWeekKey]?.cells?.[cellKey]) return;
  weekData[currentWeekKey].cells[cellKey] = weekData[currentWeekKey].cells[cellKey].filter(e => e.id !== evId);
  save();
};

// ── AUTH ──────────────────────────────────────────────────────────────────────
window.doLogin = async function() {
  const email = document.getElementById('loginEmail').value.trim();
  const pwd = document.getElementById('loginPwd').value;
  const errEl = document.getElementById('loginError');
  const btn = document.getElementById('loginBtn');
  errEl.textContent = '';
  if (!email || !pwd) { errEl.textContent = 'Remplissez email et mot de passe'; return; }
  if (!auth) { errEl.textContent = 'Initialisation en cours, réessayez…'; bootApp(); return; }
  btn.disabled = true; btn.textContent = 'Connexion…';
  try {
    await signInWithEmailAndPassword(auth, email, pwd);
  } catch(e) {
    const msgs = {
      'auth/invalid-credential': 'Email ou mot de passe incorrect',
      'auth/invalid-email': 'Email invalide',
      'auth/too-many-requests': 'Trop de tentatives, réessayez plus tard',
      'auth/network-request-failed': 'Pas de connexion réseau',
    };
    errEl.textContent = msgs[e.code] || ('Erreur : ' + e.code);
  } finally { btn.disabled = false; btn.textContent = 'Se connecter'; }
};

window.toggleConfigMode = function() {
  configMode = !configMode;
  document.getElementById('weekGrid').classList.toggle('config-mode', configMode);
  document.getElementById('configModeBar').classList.toggle('show', configMode);
  document.getElementById('configModeBtn').style.background = configMode ? 'var(--accent)' : '';
  document.getElementById('configModeBtn').style.color = configMode ? 'white' : '';
};

window.onCellClick = function(event, slotIdx, dayIdx) {
  const cellKey = `${slotIdx}-${dayIdx}`;
  const weekType = isWeekA(currentMonday) ? 'A' : 'B';
  if (configMode) {
    // Toggle no-cours
    edtConfig[weekType][cellKey] = !edtConfig[weekType][cellKey];
    save();
    return;
  }
  // Normal mode: open add modal only if not no-cours
  if (!edtConfig[weekType][cellKey]) {
    openAddModal(slotIdx, dayIdx);
  }
};

window.saveDayNote = function(dateKey, value) {
  if (!weekData[currentWeekKey]) weekData[currentWeekKey] = { notes: '', cells: {}, dayNotes: {} };
  if (!weekData[currentWeekKey].dayNotes) weekData[currentWeekKey].dayNotes = {};
  weekData[currentWeekKey].dayNotes[dateKey] = value;
  save();
};

window.doLogout = async function() { if (auth) await signOut(auth); };

// ── HELPERS ───────────────────────────────────────────────────────────────────
function setSyncState(s) { document.getElementById('syncDot').className = 'sync-dot ' + s; }
function uid() { return Math.random().toString(36).slice(2,10); }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function toast(msg, dur=2200) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(el._t); el._t = setTimeout(() => el.classList.remove('show'), dur);
}

// Close modal on overlay click
document.getElementById('addModal').addEventListener('click', e => { if(e.target.id==='addModal') closeModal(); });

// ── SETTINGS ──────────────────────────────────────────────────────────────────
let settingsEDT = null; // working copy while editing

window.openSettings = function() {
  // Deep copy for editing
  settingsEDT = {
    slots: [...SLOTS],
    classes: CLASS_LIST.map(c => ({...c})),
    A: {}, B: {}
  };
  SLOTS.forEach(s => {
    settingsEDT.A[s] = Array.isArray(EDT.A && EDT.A[s]) ? [...EDT.A[s]] : [null,null,null,null,null];
    settingsEDT.B[s] = Array.isArray(EDT.B && EDT.B[s]) ? [...EDT.B[s]] : [null,null,null,null,null];
    // Ensure length 5
    while (settingsEDT.A[s].length < 5) settingsEDT.A[s].push(null);
    while (settingsEDT.B[s].length < 5) settingsEDT.B[s].push(null);
  });
  renderSettingsClasses();
  renderSettingsEDT('A');
  renderSettingsEDT('B');
  renderSettingsSlots();
  document.getElementById('settingsScreen').classList.add('show');
};

window.closeSettings = function() {
  document.getElementById('settingsScreen').classList.remove('show');
};

window.saveSettings = function() {
  // Apply working copy to live data
  SLOTS = settingsEDT.slots;
  EDT.A = {}; EDT.B = {};
  SLOTS.forEach(s => {
    EDT.A[s] = (settingsEDT.A[s] || [null,null,null,null,null]).map(v => v || null);
    EDT.B[s] = (settingsEDT.B[s] || [null,null,null,null,null]).map(v => v || null);
  });
  CLASS_LIST = settingsEDT.classes;
  closeSettings();
  save();
  renderWeek();
  toast('EDT enregistré ✓');
};

function renderSettingsClasses() {
  const el = document.getElementById('classesEditor');
  el.innerHTML = settingsEDT.classes.map((c, i) => `
    <div class="class-row">
      <div class="class-swatch" style="background:${c.color}"></div>
      <span class="class-name-badge">${esc(c.name)}</span>
      <input type="color" value="${c.color}" onchange="settingsEDT.classes[${i}].color=this.value;renderSettingsEDT('A');renderSettingsEDT('B')"
        style="width:36px;height:28px;border:1.5px solid var(--border2);border-radius:6px;padding:2px;cursor:pointer">
      <button class="del-btn" onclick="delClass(${i})">✕</button>
    </div>`).join('');
}

window.addClass = function() {
  const name = document.getElementById('newClassName').value.trim();
  const color = document.getElementById('newClassColor').value;
  if (!name) return;
  if (settingsEDT.classes.find(c => c.name === name)) { toast('Classe déjà existante'); return; }
  settingsEDT.classes.push({ name, color });
  // Add empty column to all slots
  settingsEDT.slots.forEach(s => {
    settingsEDT.A[s] = settingsEDT.A[s] || [null,null,null,null,null];
    settingsEDT.B[s] = settingsEDT.B[s] || [null,null,null,null,null];
  });
  document.getElementById('newClassName').value = '';
  renderSettingsClasses();
  renderSettingsEDT('A');
  renderSettingsEDT('B');
};

window.delClass = function(i) {
  const name = settingsEDT.classes[i].name;
  if (!confirm(`Supprimer la classe "${name}" ? Elle sera retirée de l'EDT.`)) return;
  settingsEDT.classes.splice(i, 1);
  // Remove from EDT grids
  settingsEDT.slots.forEach(s => {
    ['A','B'].forEach(w => {
      settingsEDT[w][s] = settingsEDT[w][s].map(v => v === name ? null : v);
    });
  });
  renderSettingsClasses();
  renderSettingsEDT('A');
  renderSettingsEDT('B');
};

function renderSettingsEDT(week) {
  const el = document.getElementById('edtEditor' + week);
  const classes = settingsEDT.classes;
  const slots = settingsEDT.slots;
  const days = ['Lun','Mar','Mer','Jeu','Ven'];

  let html = `<table class="settings-table"><thead><tr>
    <th>Créneau</th>${days.map(d => `<th>${d}</th>`).join('')}
  </tr></thead><tbody>`;

  slots.forEach((slot, si) => {
    // Ensure slot array exists
    if (!settingsEDT[week][slot]) settingsEDT[week][slot] = [null,null,null,null,null];
    html += `<tr><td style="font-weight:700;font-size:0.85rem;color:var(--text2);padding:4px 8px">${esc(slot)}</td>`;
    for (let d = 0; d < 5; d++) {
      const val = settingsEDT[week][slot][d] || '';
      const bgColor = val ? (classes.find(c=>c.name===val)?.color || 'white') : 'white';
      html += `<td>
        <select data-week="${week}" data-slot="${si}" data-day="${d}"
          style="background:${bgColor}">
          <option value="">—</option>
          ${classes.map(c => `<option value="${esc(c.name)}" ${val===c.name?'selected':''}>${esc(c.name)}</option>`).join('')}
        </select>
      </td>`;
    }
    html += '</tr>';
  });

  html += '</tbody></table>';
  el.innerHTML = html;

  // Attach events via delegation (avoids inline JS string issues)
  el.querySelectorAll('select').forEach(sel => {
    sel.addEventListener('change', function() {
      const w = this.dataset.week;
      const si = parseInt(this.dataset.slot);
      const d = parseInt(this.dataset.day);
      const slot = settingsEDT.slots[si];
      if (!settingsEDT[w][slot]) settingsEDT[w][slot] = [null,null,null,null,null];
      settingsEDT[w][slot][d] = this.value || null;
      const color = this.value ? (settingsEDT.classes.find(c=>c.name===this.value)?.color || 'white') : 'white';
      this.style.background = color;
      this.parentElement.style.background = color;
    });
  });
}

function renderSettingsSlots() {
  const el = document.getElementById('slotsEditor');
  el.innerHTML = settingsEDT.slots.map((s, i) => `
    <div class="slot-row">
      <input type="text" value="${esc(s)}" onchange="settingsEDT.slots[${i}]=this.value;renderSettingsEDT('A');renderSettingsEDT('B')" placeholder="ex: M1">
      <span style="font-size:0.78rem;color:var(--text3)">(nom du créneau)</span>
      <button class="del-btn" onclick="delSlot(${i})">✕</button>
    </div>`).join('');
}

window.addSlot = function() {
  const name = `S${settingsEDT.slots.length - 3}`;
  settingsEDT.slots.push(name);
  settingsEDT.A[name] = [null,null,null,null,null];
  settingsEDT.B[name] = [null,null,null,null,null];
  renderSettingsSlots();
  renderSettingsEDT('A');
  renderSettingsEDT('B');
};

window.delSlot = function(i) {
  const name = settingsEDT.slots[i];
  if (!confirm(`Supprimer le créneau "${name}" ?`)) return;
  settingsEDT.slots.splice(i, 1);
  delete settingsEDT.A[name];
  delete settingsEDT.B[name];
  renderSettingsSlots();
  renderSettingsEDT('A');
  renderSettingsEDT('B');
};

// Force re-save EDT from current settingsEDT selects state
window.resetEdtConfig = async function() {
  if (!confirm('Réinitialiser toutes les cases grisées manuellement (mode ✏️) ? Cela ne supprime pas votre EDT.')) return;
  edtConfig = { A: {}, B: {} };
  await save();
  renderWeek();
  toast('Cases réinitialisées ✓');
};

window.repairEDT = function() {
  // Read current values directly from the DOM selects
  ['A','B'].forEach(w => {
    const table = document.getElementById('edtEditor' + w);
    if (!table) return;
    table.querySelectorAll('select').forEach(sel => {
      const si = parseInt(sel.dataset.slot);
      const d = parseInt(sel.dataset.day);
      const slot = settingsEDT.slots[si];
      if (!slot) return;
      if (!settingsEDT[w][slot]) settingsEDT[w][slot] = [null,null,null,null,null];
      settingsEDT[w][slot][d] = sel.value || null;
    });
  });
  saveSettings();
  toast('EDT réparé et sauvegardé ✓');
};

bootApp();
</script>
</body>
</html>
